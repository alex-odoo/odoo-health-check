[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
    "odoo_health_check/__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "W", "B", "I", "UP"]
ignore = [
    "E501",  # line length is enforced by formatter, not linter
    "B008",  # function calls in default args (Odoo lambda defaults)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]                # Odoo re-exports
"odoo_health_check/tests/__init__.py" = ["F401"]
"odoo_health_check/__manifest__.py" = ["B018"]  # bare dict expression
